<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>BABIMOB — Plan vivant d'Abidjan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800;12..96,900&family=Anton&display=swap">
<style>
  /* BABIMOB — Abidjan-inspired design system */
  :root {
    --orange: #F26C1A;
    --orange-deep: #D9510A;
    --green: #0EA85B;
    --green-deep: #0A8A4A;
    --blue: #1E5BFF;
    --cream: #F7F1E6;
    --cream-2: #FBF6EC;
    --ink: #1A1410;
    --ink-2: #3A3128;
    --muted: #8B7E6E;
    --line: rgba(26, 20, 16, 0.08);
    --terracotta: #C4582E;
    --gold: #E8B23C;
  }
  [data-theme="dark"] {
    --cream: #14110D;
    --cream-2: #1C1813;
    --ink: #F7F1E6;
    --ink-2: #D9CDB8;
    --muted: #8B7E6E;
    --line: rgba(247, 241, 230, 0.10);
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body { margin: 0; font-family: 'Inter', -apple-system, system-ui, sans-serif; color: var(--ink); background: #2A2520; overflow-x: hidden; }
  .font-display { font-family: var(--font-display, 'Archivo Black'), 'Archivo Black', Impact, sans-serif; font-weight: 900; letter-spacing: -0.02em; line-height: 0.95; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .wax-bg {
    background-image:
      radial-gradient(circle at 20% 30%, currentColor 1.5px, transparent 1.5px),
      radial-gradient(circle at 80% 70%, currentColor 1.5px, transparent 1.5px),
      radial-gradient(circle at 50% 90%, currentColor 1px, transparent 1px);
    background-size: 40px 40px, 40px 40px, 30px 30px;
    background-position: 0 0, 20px 20px, 10px 10px;
  }
  .wax-stripe { background-image: repeating-linear-gradient(45deg, currentColor 0, currentColor 1px, transparent 1px, transparent 8px); }
  .wax-zigzag {
    background-image: 
      linear-gradient(135deg, currentColor 25%, transparent 25%),
      linear-gradient(225deg, currentColor 25%, transparent 25%),
      linear-gradient(315deg, currentColor 25%, transparent 25%),
      linear-gradient(45deg, currentColor 25%, transparent 25%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
  }
  @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(2.5); opacity: 0; } }
  .pulse-ring::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: inherit; animation: pulse-ring 1.6s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; z-index: -1; }
  @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .slide-up { animation: slide-up 0.4s ease-out backwards; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .fade-in { animation: fade-in 0.3s ease-out backwards; }
  @keyframes shimmer { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .shimmer { animation: shimmer 1.4s ease-in-out infinite; }
  @keyframes compass-needle { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(12deg); } }
  .compass-needle { animation: compass-needle 3s ease-in-out infinite; transform-origin: 50% 100%; }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .ticker { animation: ticker 30s linear infinite; }
  .press { transition: transform 0.15s ease, box-shadow 0.15s ease; cursor: pointer; }
  .press:active { transform: scale(0.97); }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--line); margin: 8px auto 4px; }
</style>
<style>
  html, body { height: 100%; }
  body {
    background: radial-gradient(ellipse at top, #3a312a 0%, #1a1410 80%);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .stage {
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }
  .header {
    text-align: center; color: #f7f1e6; max-width: 460px;
  }
  .header .kicker {
    font-size: 11px; font-weight: 800; letter-spacing: 1px;
    color: #F26C1A; margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Archivo Black', sans-serif; font-size: 32px; margin: 0;
    line-height: 1; letter-spacing: -0.02em;
  }
  .header p { font-size: 13px; opacity: 0.7; margin: 8px 0 0; line-height: 1.5; }
  .nav-bar {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    padding: 10px; border-radius: 16px;
    background: rgba(255,255,255,0.06); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    max-width: 480px;
  }
  .nav-bar button {
    padding: 8px 14px; border-radius: 10px; border: none;
    background: transparent; color: rgba(247,241,230,0.65);
    font-family: Inter, sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .nav-bar button:hover { color: #fff; background: rgba(255,255,255,0.06); }
  .nav-bar button.active {
    background: #F26C1A; color: #fff;
    box-shadow: 0 2px 8px rgba(242,108,26,0.4);
  }
  .frame-wrap {
    position: relative;
  }

  /* ───────── PRINT MODE ───────── */
  .print-stage { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 0; }
  .print-cover { width: 100%; padding: 60px 40px 30px; text-align: center; color: #f7f1e6; max-width: 1100px; margin: 0 auto; }
  .print-cover h1 { font-family: 'Archivo Black', sans-serif; font-size: 64px; margin: 12px 0 0; line-height: 0.95; letter-spacing: -0.02em; }
  .print-cover .kicker { font-size: 13px; font-weight: 800; letter-spacing: 1.5px; color: #F26C1A; }
  .print-cover p { font-size: 16px; opacity: 0.7; max-width: 640px; margin: 16px auto 0; line-height: 1.5; }
  .print-page { width: 100%; max-width: 1100px; margin: 0 auto; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .print-page .label { color: #f7f1e6; font-family: 'Archivo Black', sans-serif; font-size: 22px; letter-spacing: -0.01em; }
  .print-page .sub { color: rgba(247,241,230,0.55); font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: -10px; }

  @media print {
    @page { size: A4 landscape; margin: 0.4cm; }
    html, body {
      background: #fff !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
    body { background: radial-gradient(ellipse at top, #3a312a 0%, #1a1410 80%) !important; }
    .nav-bar, .header, .frame-wrap, [data-tweaks-panel], [class*="tweaks"], button[aria-label*="tweak" i] { display: none !important; }
    .print-cover { break-after: page; padding: 80px 40px; }
    .print-page {
      break-inside: avoid;
      break-after: page;
      page-break-after: always;
      min-height: calc(100vh - 1cm);
      justify-content: center;
      padding: 10px;
    }
    .print-page:last-child { break-after: auto; page-break-after: auto; }
    /* iOS device frame should fit a landscape A4 page (≈ 27cm × 18cm usable) */
    .print-page .frame-wrap-print { transform: scale(0.78); transform-origin: center center; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  
  
  
  
  
  
  
  

  <script type="text/babel">

// ===== ios-frame.jsx =====

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function ScreenChat({ go, dark }) {
  const [step, setStep] = React.useState(0);
  const messages = [
    { from: 'bot', text: 'Yôô ! Tu pars d\'où ?', sub: 'Envoie ta position ou écris-moi en nouchi' },

    { from: 'me', text: 'Yop' },

  React.useEffect(() => {
    if (step < messages.length) {
      const t = setTimeout(() => setStep(step + 1), step === 0 ? 500 : 1000);
      return () => clearTimeout(t);
    }

  const visible = messages.slice(0, step);

  const Bubble = ({ children, sub }) => (
    <div className="slide-up" style={{ alignSelf: 'flex-start', maxWidth: '80%', display: 'flex', gap: 8 }}>

  return (
    <div style={{ position: 'absolute', inset: 0, background: 'var(--cream)', display: 'flex', flexDirection: 'column' }}>

          <div style={{ fontSize: 11, color: 'var(--muted)' }}>Comprend nouchi · 17 langues locales</div>

      </div>

      <div className="no-scrollbar" style={{ flex: 1, overflowY: 'auto', padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}>
        {visible.map((m, i) => {
          if (m.from === 'me') return (
            <div key={i} className="slide-up" style={{ alignSelf: 'flex-end', maxWidth: '78%' }}>
              <div style={{ background: 'var(--green)', color: '#fff', padding: '10px 14px', borderRadius: '18px 18px 4px 18px', fontSize: 14, fontWeight: 600 }}>{m.text}</div>
            </div>
          );
          if (m.from === 'bot') return <Bubble key={i} sub={m.sub}>{m.text}</Bubble>;
          return (
            <div key={i} className="slide-up" style={{ alignSelf: 'flex-start', maxWidth: '92%', width: '92%', display: 'flex', gap: 8 }}>
              <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'var(--orange)', color: '#fff', fontSize: 13, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 2 }}>B</div>
              <div style={{ flex: 1, background: 'var(--cream-2)', borderRadius: 18, padding: 14, border: '1px solid var(--line)' }}>
                <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--orange)', letterSpacing: 0.5, marginBottom: 8 }}>3 OPTIONS POUR TOI</div>
                {[
                  { kind: 'gbaka', name: 'Gbaka direct', detail: 'Adjamé → Yop Selmer', time: '~18 min', price: '200F', best: true },
                  { kind: 'woro', name: 'Woro-woro', detail: '2 changements', time: '~25 min', price: '350F' },
                  { kind: 'taxi', name: 'Taxi compteur', detail: 'porte à porte', time: '~22 min', price: '1500F' },

                    <Vehicle kind={opt.kind} size={36} />
                    <div style={{ flex: 1 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                        <span style={{ fontSize: 13, fontWeight: 800, color: 'var(--ink)' }}>{opt.name}</span>
                        {opt.best && <Pill color="var(--green)" size="sm">RAPIDE</Pill>}

                      <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 1 }}>{opt.detail} · {opt.time}</div>

                    <div style={{ textAlign: 'right' }}>
                      <div className="font-display" style={{ fontSize: 16, color: 'var(--orange)' }}>{opt.price}</div>
                      <div style={{ fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 0.5 }}>tarif réel</div>
                    </div>
                  </div>
                ))}
                <div style={{ display: 'flex', gap: 6, marginTop: 10 }}>

                </div>
              </div>
            </div>

        {step >= messages.length && (
          <div style={{ alignSelf: 'flex-start', display: 'flex', gap: 6, marginTop: 4 }}>
            {['Moins cher ?', 'Sans changement', 'À pied possible ?'].map((s, i) => (

            ))}
          </div>
        )}
      </div>

      <div style={{ padding: '8px 12px 24px', borderTop: '1px solid var(--line)', display: 'flex', gap: 8, alignItems: 'center', background: 'var(--cream-2)' }}>
        <div style={{ flex: 1, height: 44, borderRadius: 14, background: 'var(--cream)', border: '1px solid var(--line)', padding: '0 14px', display: 'flex', alignItems: 'center', fontSize: 14, color: 'var(--muted)' }}>

          <Ic.Mic s={20} />
        </button>
      </div>
    </div>
  );
}

                      position: 'absolute', left: 4, top: 18, width: 32, height: 32, borderRadius: '50%',
                      background: 'var(--orange)', opacity: 0.4
                    }} />
                  )}
                  <div style={{
                    width: isNow ? 40 : 16, height: isNow ? 40 : 16, borderRadius: '50%',
                    background: dotColor,
                    border: isNow ? '4px solid var(--cream)' : 'none',
                    boxShadow: isNow ? '0 0 0 2px var(--orange), 0 4px 12px rgba(242,108,26,0.4)' : 'none',
                    marginLeft: isNow ? -12 : 0,
                    marginTop: isNow ? -4 : 4,
                    display: 'flex', alignItems: 'center', justifyContent: 'center'
                  }}>
                    {isNow && <Vehicle kind="gbaka" size={22} color="#fff" />}
                  </div>
                </div>
                {/* Content */}
                <div style={{ flex: 1, paddingTop: isNow ? 18 : 14, paddingBottom: 14 }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 8 }}>
                    <div className={isNow ? 'font-display' : ''} style={{
                      fontSize: isNow ? 20 : 15,
                      fontWeight: isNow ? 900 : isPast ? 500 : 600,
                      color: isFuture ? 'var(--muted)' : 'var(--ink)',
                      textDecoration: isPast ? 'line-through' : 'none',
                      opacity: isPast ? 0.6 : 1
                    }}>{s.name}</div>
                    <div style={{ fontSize: 11, color: 'var(--muted)', fontVariantNumeric: 'tabular-nums' }} className="font-mono">{s.time}</div>
                  </div>
                  {isNow && (
                    <div className="slide-up" style={{ marginTop: 8, padding: 12, borderRadius: 14, background: 'var(--cream-2)', border: '1.5px solid var(--orange)' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
                        <div className="shimmer" style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--orange)' }} />
                        <span style={{ fontSize: 11, fontWeight: 800, color: 'var(--orange)', letterSpacing: 0.5 }}>TU ES ICI</span>
                      </div>
                      <div style={{ fontSize: 12, color: 'var(--ink-2)', marginBottom: 8 }}>Descends pour : Tonton Cuisine, Pharmacie 24h, Marché vivrier</div>
                      <div style={{ display: 'flex', gap: 6 }}>
                        <button className="press" onClick={() => go('stop')} style={{ flex: 1, padding: '8px', borderRadius: 10, border: 'none', background: 'var(--orange)', color: '#fff', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>Détail arrêt</button>
                        <button className="press" style={{ padding: '8px 14px', borderRadius: 10, border: '1px solid var(--line)', background: 'var(--cream)', fontSize: 12, fontWeight: 700, color: 'var(--ink)', cursor: 'pointer' }}>Je descends</button>
                      </div>
                    </div>
                  )}
                  {s.eta && !isNow && (
                    <div style={{ fontSize: 11, color: 'var(--green)', fontWeight: 700, marginTop: 2 }}>{s.eta}</div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

              <p style={{ fontSize: 13, color: 'var(--muted)', margin: 0, lineHeight: 1.5 }}>{f.text}</p>
            </div>
          </div>
        ))}
      </div>

      {/* Stats */}
      <div style={{ padding: '24px 16px', background: 'var(--ink)', color: 'var(--cream)' }}>
        <div className="font-display" style={{ fontSize: 22, marginBottom: 16, color: '#fff' }}>Abidjan en chiffres</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
          {[
            { v: '247K', l: 'Babis actifs' },
            { v: '4 200', l: 'Arrêts cartographiés' },
            { v: '17', l: 'Communes' },
            { v: '38K', l: 'Tarifs/jour confirmés' },
          ].map((s, i) => (
            <div key={i} style={{ padding: 16, borderRadius: 16, background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)' }}>
              <div className="font-display" style={{ fontSize: 32, color: 'var(--orange)' }}>{s.v}</div>
              <div style={{ fontSize: 11, opacity: 0.7, textTransform: 'uppercase', letterSpacing: 0.6, marginTop: 4 }}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Final CTA */}
      <div style={{ padding: '36px 20px 80px', textAlign: 'center', background: 'var(--orange)', color: '#fff', position: 'relative', overflow: 'hidden' }}>
        <div className="wax-zigzag" style={{ position: 'absolute', inset: 0, color: '#fff', opacity: 0.15 }} />
        <div style={{ position: 'relative' }}>
          <h2 className="font-display" style={{ fontSize: 36, margin: 0, lineHeight: 1 }}>
            Babi se partage.<br/>Rejoins.
          </h2>
          <Btn size="lg" variant="secondary" onClick={() => go('onboarding')} style={{ marginTop: 20 }}>Commencer maintenant</Btn>
        </div>
      </div>
    </div>
  );
}

window.ScreenOnboarding = ScreenOnboarding;

    const { useState, useEffect } = React;

    const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "orange",
      "fontDisplay": "archivo",
      "density": "comfortable",
      "dark": false,
      "cardStyle": "border",
      "showWax": true
    }/*EDITMODE-END*/;

    const ACCENTS = {
      orange: { '--orange': '#F26C1A', '--orange-deep': '#D9510A' },
      green:  { '--orange': '#0EA85B', '--orange-deep': '#0A8A4A' },
      blue:   { '--orange': '#1E5BFF', '--orange-deep': '#1546CC' },
      gold:   { '--orange': '#E8B23C', '--orange-deep': '#C4912A' },
      pink:   { '--orange': '#E5337A', '--orange-deep': '#B82460' },
    };
    const FONTS = {
      archivo: '"Archivo Black"',
      bricolage: '"Bricolage Grotesque"',
      anton: 'Anton',
    };

    const SCREENS = [
      { id: 'landing', label: 'Landing', Comp: 'ScreenLanding' },
      { id: 'onboarding', label: 'Onboarding', Comp: 'ScreenOnboarding' },
      { id: 'home', label: 'Home / Map', Comp: 'ScreenHome' },
      { id: 'chat', label: 'IA Chat', Comp: 'ScreenChat' },
      { id: 'compass', label: 'Boussole', Comp: 'ScreenCompass' },
      { id: 'line', label: 'Ligne live', Comp: 'ScreenLine' },
      { id: 'stop', label: 'Arrêt', Comp: 'ScreenStop' },
      { id: 'community', label: "C'comment", Comp: 'ScreenCommunity' },
      { id: 'profile', label: 'Profil', Comp: 'ScreenProfile' },
    ];

    function App() {
      const [tw, setTw] = useTweaks(TWEAKS_DEFAULTS);
      const [screen, setScreen] = React.useState('landing');

      React.useEffect(() => {
        const root = document.documentElement;
        const acc = ACCENTS[tw.accent] || ACCENTS.orange;
        Object.entries(acc).forEach(([k, v]) => root.style.setProperty(k, v));
        root.style.setProperty('--font-display', FONTS[tw.fontDisplay] || FONTS.archivo);
        root.dataset.theme = tw.dark ? 'dark' : 'light';
      }, [tw.accent, tw.fontDisplay, tw.dark]);

      const Comp = window[SCREENS.find(s => s.id === screen)?.Comp] || window.ScreenLanding;

      return (
        <div className="print-stage">
          <div className="print-cover">
            <div className="kicker">PROTOTYPE · BABIMOB 2026</div>
            <h1>Le plan vivant<br/>d'Abidjan.</h1>
            <p>Refonte hi-fi · 9 écrans navigables — Landing, Onboarding, Home/Map, IA Chat, Boussole, Ligne live, Arrêt, C'comment, Profil</p>
          </div>
          {SCREENS.map((s, i) => {
            const SC = window[s.Comp] || window.ScreenLanding;
            return (
              <div key={s.id} className="print-page">
                <div className="sub">Écran {String(i+1).padStart(2,'0')} / {SCREENS.length}</div>
                <div className="label">{s.label}</div>
                <div className="frame-wrap-print">
                  <IOSDevice dark={tw.dark}>
                    <SC go={() => {}} dark={tw.dark} density={tw.density} />
                  </IOSDevice>
                </div>
              </div>
            );
          })}

          <TweaksPanel title="Tweaks" hidden>
            <TweakSection label="Identité" />
            <TweakRadio label="Accent" value={tw.accent}
              onChange={v => setTw('accent', v)}
              options={[
                { value: 'orange', label: 'Orange' },
                { value: 'green', label: 'Vert' },
                { value: 'blue', label: 'Bleu' },
                { value: 'gold', label: 'Or' },
                { value: 'pink', label: 'Pink' },
              ]} />
            <TweakRadio label="Typo display" value={tw.fontDisplay}
              onChange={v => setTw('fontDisplay', v)}
              options={[
                { value: 'archivo', label: 'Archivo' },
                { value: 'bricolage', label: 'Bricolage' },
                { value: 'anton', label: 'Anton' },
              ]} />
            <TweakSection label="Affichage" />
            <TweakRadio label="Densité" value={tw.density}
              onChange={v => setTw('density', v)}
              options={[
                { value: 'compact', label: 'Compact' },
                { value: 'comfortable', label: 'Spacieux' },
              ]} />
            <TweakToggle label="Mode sombre" value={tw.dark} onChange={v => setTw('dark', v)} />
            <TweakToggle label="Motif wax" value={tw.showWax} onChange={v => setTw('showWax', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    // Auto-print once fonts + layout are ready
    (async () => {
      try {
        if (document.fonts && document.fonts.ready) await document.fonts.ready;
      } catch (e) {}
      // Wait for React render + heatmap layout
      await new Promise(r => setTimeout(r, 1200));
      window.print();
    })();
  </script>
</body>
